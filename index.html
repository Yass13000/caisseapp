<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    
<meta name="viewport" content="width=1080, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#2f3a28" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/iconmob.png" />
    <link rel="apple-touch-icon" href="/iconmob.png">
    
    <link rel="preload" href="/fonts/DunkinSans-ExtraBold.otf" as="font" type="font/otf" crossorigin />
    
    <script>
      function loadGoogleMaps() {
        if (window.google && window.google.maps) return;
        const script = document.createElement('script');
        script.async = true;
        script.defer = true;
        script.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyBV4XXE1heGXMwhX3iuOtjeoGAiw4Njero&libraries=places&loading=async&callback=initGoogleMaps';
        document.head.appendChild(script);
      }
      function initGoogleMaps() { window.dispatchEvent(new Event('google-maps-loaded')); }
      window.addEventListener('load', () => { setTimeout(loadGoogleMaps, 2000); });
    </script>
    
    <title>Module Caisse</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) { registration.unregister(); }
        });
      }
    </script>
  </body>
</html>
